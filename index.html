<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>OpenLight Studio</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                margin: 0;
                padding: 0;
                background-color: #f4f4f9;
                color: #333;
            }
            header {
                background-color: #2c3e50;
                color: white;
                padding: 10px 0;
                text-align: center;
            }
            .container {
                width: 80%;
                margin: auto;
                overflow: hidden;
            }
            .content {
                padding: 20px;
                background-color: white;
                margin-top: 20px;
                border-radius: 5px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            }
            button {
                background-color: #27ae60;
                color: white;
                border: none;
                padding: 10px 20px;
                cursor: pointer;
                border-radius: 5px;
            }
            button:hover {
                background-color: #2ecc71;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>欢迎来到 OpenLight Studio</h1>
        </header>

        <div class="container">
            <div class="content">
                <h2>关于我们</h2>
                <p>
                    我们是专注于创意和技术的工作室，致力于为客户提供高质量的产品和服务。
                </p>

                <h3>我们的服务</h3>
                <ul>
                    <li>Web 开发</li>
                    <li>移动应用开发</li>
                    <li>品牌设计</li>
                    <li>数字营销</li>
                </ul>

                <button onclick="showMessage()">点击这里获取更多信息</button>
            </div>
        </div>

        <script>
            function showMessage() {
                alert(
                    "感谢您的关注！请访问我们的 GitHub 获取更多信息：https://github.com/OpenLight-Studio",
                );
            }
        </script>
    </body>
</html>
